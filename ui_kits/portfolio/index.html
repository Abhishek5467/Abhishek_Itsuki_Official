<!-- @dsCard group="Portfolio" viewport="1280x780" name="Portfolio — single page" subtitle="Full 3D-animated portfolio homepage" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abhishek Singh — AI & Photonics Researcher</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html { scroll-behavior: smooth; }
  body { background: var(--bg); }
  #photon-canvas { display:block; }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-portrait { max-width: 380px; }
    .two-col { grid-template-columns: 1fr !important; }
    .proj-grid { grid-template-columns: repeat(2,1fr) !important; }
    .stat-grid { grid-template-columns: repeat(2,1fr) !important; }
    .social-grid { grid-template-columns: repeat(2,1fr) !important; }
  }
  @media (max-width: 620px) {
    .hero-stats { grid-template-columns: repeat(2,1fr) !important; }
    .hero-stats > div:nth-child(3) { border-left: none !important; }
    .proj-grid { grid-template-columns: 1fr !important; }
    .stat-grid { grid-template-columns: 1fr !important; }
    .social-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="module" src="./photon-bg.js"></script>
  <script type="text/babel" src="./sections-top.jsx"></script>
  <script type="text/babel" src="./sections-bottom.jsx"></script>
  <script type="text/babel" data-presets="react">
    const App = window.PortfolioApp;
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    // Mount the 3D photonic background once the hero canvas exists.
    (function waitForCanvas() {
      const c = document.getElementById("photon-canvas");
      if (c && window.mountPhotonBackground) { window.mountPhotonBackground(c); return; }
      requestAnimationFrame(waitForCanvas);
    })();
  </script>
</body>
</html>
