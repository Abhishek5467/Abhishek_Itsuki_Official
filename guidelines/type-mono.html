<!-- @dsCard group="Type" viewport="700x180" name="Mono — JetBrains Mono" subtitle="Data, ranks, labels and code" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); padding:28px; display:flex; flex-direction:column; gap:16px; font-family:var(--font-mono); }
  .eyebrow { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }
  .data { font-size:28px; font-weight:700; color:var(--text-hi); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
  .data span { color:var(--photon); font-size:14px; }
  .code { font-size:13px; color:var(--text-mid); }
  .code b { color:var(--optic-bright); font-weight:400; }
</style>
</head>
<body>
  <div class="eyebrow">// research · index 02</div>
  <div class="data">AIR 1046 <span>GATE ECE · 662</span></div>
  <div class="code"><b>Score</b> = PatchWeight × PatchScore + FeatureWeight × FeatureScore</div>
</body>
</html>
