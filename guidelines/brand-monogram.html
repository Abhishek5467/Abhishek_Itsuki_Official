<!-- @dsCard group="Brand" viewport="700x200" name="Monogram & wordmark" subtitle="AS gradient tile lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); padding:30px; display:flex; align-items:center; gap:40px; }
  .mono { width:84px; height:84px; border-radius:var(--r-lg); background:var(--grad-photon);
    color:var(--accent-contrast); display:grid; place-items:center; font-family:var(--font-display);
    font-weight:700; font-size:38px; letter-spacing:-0.04em; box-shadow:var(--glow-photon); }
  .lock { display:flex; align-items:center; gap:14px; }
  .lock .m { width:48px; height:48px; border-radius:var(--r-sm); background:var(--grad-photon);
    color:var(--accent-contrast); display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:20px; }
  .wm { font-family:var(--font-display); font-weight:700; font-size:26px; color:var(--text-hi); letter-spacing:-0.02em; }
  .role { font-family:var(--font-mono); font-size:11px; color:var(--text-mid); letter-spacing:.12em; text-transform:uppercase; margin-top:2px; }
</style>
</head>
<body>
  <div class="mono">AS</div>
  <div class="lock">
    <div class="m">AS</div>
    <div>
      <div class="wm">Abhishek Singh</div>
      <div class="role">AI · Photonics · Software</div>
    </div>
  </div>
</body>
</html>
