<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Geometric headline face with gradient highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); padding:28px; }
  .ey { font-family:var(--font-mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  .d1 { font-family:var(--font-display); font-weight:700; font-size:56px; line-height:1.02; letter-spacing:-0.04em; color:var(--text-hi); margin:0; }
  .d1 em { font-style:normal; background:var(--grad-photon); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .d2 { font-family:var(--font-display); font-weight:600; font-size:26px; letter-spacing:-0.02em; color:var(--text); margin:14px 0 0; }
</style>
</head>
<body>
  <div class="ey">Space Grotesk · Display</div>
  <h1 class="d1">Engineering <em>intelligent</em> systems</h1>
  <p class="d2">Photonics · Computer Vision · Software</p>
</body>
</html>
