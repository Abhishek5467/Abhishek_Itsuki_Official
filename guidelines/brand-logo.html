<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); padding:24px; display:flex; align-items:center; gap:28px; }
  .frame { background:#fff; border-radius:var(--r-md); padding:14px 18px; display:grid; place-items:center; }
  .frame img { width:200px; height:auto; display:block; }
  .note { font-family:var(--font-body); color:var(--text-mid); font-size:14px; max-width:36ch; }
  .note b { color:var(--text-hi); font-weight:600; }
</style>
</head>
<body>
  <div class="frame"><img src="../assets/sam-animation-logo.svg" alt="Sam Animation studio logo" /></div>
  <p class="note"><b>Sam Animation</b> — Abhishek's 3D animation studio. Use on a light frame; pairs with the photon palette via its teal/cyan accent.</p>
</body>
</html>
